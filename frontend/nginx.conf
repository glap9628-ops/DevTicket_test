server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /devticket/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /devticket/ {
        try_files $uri $uri/ /devticket/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        return 301 /devticket/;
    }
}
