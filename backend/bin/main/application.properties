spring.application.name=devticket
server.port=8082
server.servlet.context-path=/devticket/api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devticket}
spring.datasource.username=${DB_USERNAME:devticket}
spring.datasource.password=${DB_PASSWORD:devticket1234}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath:com/innotium/devticket/domain/**/repository/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

app.auth.enabled=${APP_AUTH_ENABLED:false}

# 그룹 ID → devticket 역할 매핑
# DB seed: 1=데브옵스팀, 2=기술연구소팀 → DEVELOPER / 3=QA팀, 4=영업팀 → REQUESTER
# 관리자(ADMIN)는 users.role='admin' 으로 별도 부여 (어느 팀이든)
app.role.developer-group-ids=${DEVELOPER_GROUP_IDS:1,2}
