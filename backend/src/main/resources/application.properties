spring.application.name=devticket
server.port=8082
server.servlet.context-path=/devticket/api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devticket}
spring.datasource.username=${DB_USERNAME:devticket}
spring.datasource.password=${DB_PASSWORD:devticket1234}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath:com/innotium/devticket/domain/**/repository/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Flyway — Docker 환경: SPRING_FLYWAY_ENABLED=false (Flyway 컨테이너가 직접 실행)
#           로컬 개발:     true (Spring Boot가 자동 실행)
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

app.auth.enabled=${APP_AUTH_ENABLED:false}

# 그룹 ID → devticket 역할 매핑
# DB seed: 1=데브옵스팀, 2=기술연구소팀 → DEVELOPER / 3=QA팀, 4=영업팀 → REQUESTER
# 관리자(ADMIN)는 users.role='admin' 으로 별도 부여 (어느 팀이든)
app.role.developer-group-ids=${DEVELOPER_GROUP_IDS:1,2}

# ─── File Upload ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=${UPLOAD_DIR:/app/uploads}

# ─── CI/CD Sync API ─────────────────────────────────────────────────────────
# POST /v1/tickets/qa — system 계정 JWT 쿠키 인증 사용
# CI/CD: POST /api/auth/login → JWT 쿠키 획득 → POST /v1/tickets/qa 호출
# JWT 만료(401) 시 자동 재로그인 후 재시도
