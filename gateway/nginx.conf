worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream auth_service {
        server auth:8000;
    }

    upstream backend_service {
        server backend:8082;
    }

    upstream frontend_service {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # Auth verification subrequest (JWT cookie)
        location = /internal/auth/verify {
            internal;
            proxy_pass http://auth_service/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        # Auth verification subrequest (API Key — DevOps 연동 전용)
        location = /internal/auth/verify-apikey {
            internal;
            proxy_pass http://auth_service/api/auth/verify-apikey;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Api-Key $http_x_api_key;
        }

        # ── Auth service endpoints (no auth required) ──────────────────
        location = /api/auth/login {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://auth_service/api/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/admin/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        # ── /devticket (trailing slash 없음) → /devticket/ 리다이렉트 ──
        location = /devticket {
            return 302 /devticket/;
        }

        # ── Login 페이지 (auth 불필요) ─────────────────────────────────
        location = /devticket/login {
            proxy_pass http://frontend_service/devticket/login;
            proxy_set_header Host $host;
        }

        # ── DevOps 장애 티켓 자동 등록 (API Key 인증) ─────────────────────────
        location = /devticket/api/v1/tickets/devops {
            limit_req zone=api burst=10 nodelay;

            auth_request /internal/auth/verify-apikey;
            auth_request_set $x_user_id         $upstream_http_x_user_id;
            auth_request_set $x_username        $upstream_http_x_user_username;
            auth_request_set $x_display_name    $upstream_http_x_display_name;
            auth_request_set $x_user_role       $upstream_http_x_user_role;
            auth_request_set $x_user_group_id   $upstream_http_x_user_group_id;
            auth_request_set $x_user_group_name $upstream_http_x_user_group_name;

            proxy_pass http://backend_service/devticket/api/v1/tickets/devops;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-ERP-User-Id         $x_user_id;
            proxy_set_header X-ERP-User-Username    $x_username;
            proxy_set_header X-ERP-Display-Name     $x_display_name;
            proxy_set_header X-ERP-User-Role        $x_user_role;
            proxy_set_header X-ERP-User-Group-Id    $x_user_group_id;
            proxy_set_header X-ERP-User-Group-Name  $x_user_group_name;

            error_page 401 = @unauthorized;
        }

        # ── Backend API (auth required) ────────────────────────────────
        location /devticket/api/ {
            limit_req zone=api burst=50 nodelay;

            auth_request /internal/auth/verify;
            auth_request_set $x_user_id         $upstream_http_x_user_id;
            auth_request_set $x_username        $upstream_http_x_user_username;
            auth_request_set $x_display_name    $upstream_http_x_display_name;
            auth_request_set $x_user_role       $upstream_http_x_user_role;
            auth_request_set $x_user_group_id   $upstream_http_x_user_group_id;
            auth_request_set $x_user_group_name $upstream_http_x_user_group_name;

            proxy_pass http://backend_service/devticket/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-ERP-User-Id         $x_user_id;
            proxy_set_header X-ERP-User-Username    $x_username;
            proxy_set_header X-ERP-Display-Name    $x_display_name;
            proxy_set_header X-ERP-User-Role       $x_user_role;
            proxy_set_header X-ERP-User-Group-Id   $x_user_group_id;
            proxy_set_header X-ERP-User-Group-Name $x_user_group_name;

            error_page 401 = @unauthorized;
        }

        # ── 401 응답 처리 (auth_request 실패 시) ──────────────────────────────
        location @unauthorized {
            default_type application/json;
            return 401 '{"statusCode":401,"message":"인증이 필요합니다.","data":null,"detail":null}';
        }

        # ── Frontend SPA (인증 없이 정적 파일 제공, auth는 API 레벨에서 처리) ─
        location /devticket/ {
            proxy_pass http://frontend_service/devticket/;
            proxy_set_header Host $host;
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = / {
            return 302 /devticket/;
        }
    }
}
